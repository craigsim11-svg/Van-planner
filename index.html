<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Van Planner">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0e0c">
<title>Van Route Planner</title>
<style>
:root {
  --bg: #0f0e0c;
  --card: #1a1816;
  --border: #2e2b27;
  --amber: #f59e0b;
  --amber-d: #92400e;
  --green: #22c55e;
  --red: #ef4444;
  --blue: #3b82f6;
  --text: #f0ece4;
  --muted: #6b6560;
  --sub: #a8a29e;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); }
body {
  color: var(--text);
  font-family: ui-monospace, 'SF Mono', monospace;
  padding-top: var(--safe-top);
  padding-bottom: calc(var(--safe-bot) + 20px);
  overflow-x: hidden;
  -webkit-text-size-adjust: 100%;
}

/* SCROLL AREA */
.scroll { max-width: 680px; margin: 0 auto; padding: 0 16px 40px; }

/* HEADER */
.header {
  display: flex; align-items: flex-end; gap: 14px;
  padding: 20px 0 16px;
  border-bottom: 2px solid var(--border);
  margin-bottom: 20px;
  position: sticky; top: var(--safe-top);
  background: var(--bg); z-index: 10;
}
.van-emoji { font-size: 40px; line-height: 1; }
.title { font-size: clamp(1.6rem, 6vw, 2.6rem); font-weight: 900; color: var(--amber); line-height: 0.92; text-shadow: 2px 2px 0 var(--amber-d); letter-spacing: -0.01em; }
.subtitle { font-size: 9px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 5px; }
.speed-badge { margin-left: auto; border: 2px solid var(--amber); border-radius: 8px; padding: 6px 12px; text-align: center; flex-shrink: 0; }
.speed-num { font-size: 26px; font-weight: 900; color: var(--amber); line-height: 1; }
.speed-unit { font-size: 8px; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; }

/* CARD */
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: 12px;
  padding: 18px; margin-bottom: 14px; position: relative; overflow: hidden;
}
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--amber), var(--amber-d)); }

/* INPUTS */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
@media (max-width: 400px) { .grid2 { grid-template-columns: 1fr; } }
.field-label { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: flex; align-items: center; gap: 5px; }
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
input[type="text"] {
  background: var(--bg); border: 1.5px solid var(--border); border-radius: 8px;
  color: var(--text); font-family: ui-monospace, monospace; font-size: 16px;
  padding: 13px 14px; width: 100%; outline: none;
  -webkit-appearance: none; transition: border-color 0.15s, box-shadow 0.15s;
}
input[type="text"]:focus { border-color: var(--amber); box-shadow: 0 0 0 3px rgba(245,158,11,0.15); }
input[type="text"]::placeholder { color: #4a4744; }

/* STOPS */
.stop-row { display: flex; gap: 8px; margin-bottom: 8px; }
.stop-row input { flex: 1; }
.btn-rm {
  background: none; border: 1.5px solid var(--border); color: var(--muted);
  width: 46px; height: 46px; border-radius: 8px; font-size: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  transition: all 0.15s;
}
.btn-rm:active { border-color: var(--red); color: var(--red); }

/* BUTTONS */
.btn-add {
  background: none; border: 1.5px dashed var(--border); color: var(--muted);
  font-family: ui-monospace, monospace; font-size: 12px; letter-spacing: 0.1em;
  padding: 11px; border-radius: 8px; width: 100%; text-transform: uppercase;
  margin-bottom: 14px; cursor: pointer; transition: all 0.15s;
}
.btn-add:active { border-color: var(--amber); color: var(--amber); }
.btn-calc {
  background: var(--amber); border: none; border-radius: 8px;
  color: var(--bg); font-family: ui-monospace, monospace; font-weight: 800;
  font-size: 17px; letter-spacing: 0.06em; padding: 15px; width: 100%;
  text-transform: uppercase; cursor: pointer; transition: all 0.15s;
  -webkit-appearance: none;
}
.btn-calc:active { background: #fcd34d; transform: scale(0.98); }
.btn-calc:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
.divider { height: 1px; background: var(--border); margin: 14px 0; opacity: 0.5; }

/* STATUS */
.status-box {
  border-radius: 0 8px 8px 0; padding: 12px 14px; font-size: 13px;
  margin-bottom: 12px; border-left: 3px solid var(--amber);
  background: var(--card); color: var(--sub); line-height: 1.5;
}
.status-box.err { border-left-color: var(--red); color: #fca5a5; }
.status-box.ok { border-left-color: var(--green); }
.status-box.info { border-left-color: var(--amber); }

/* SEGMENTS */
.seg { background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
.seg-head { background: var(--border); padding: 10px 14px; font-size: 13px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.seg-head .place { color: var(--text); font-weight: 700; }
.seg-head .arrow { color: var(--amber); font-size: 16px; }
.seg-head .leg { margin-left: auto; color: var(--muted); font-size: 11px; }
.metrics { display: flex; }
.metric { flex: 1; padding: 13px 8px; border-right: 1px solid var(--border); min-width: 0; }
.metric:last-child { border-right: none; }
.m-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 4px; white-space: nowrap; }
.m-val { font-size: 19px; font-weight: 800; line-height: 1; white-space: nowrap; }
.m-sub { font-size: 8px; color: var(--muted); margin-top: 3px; white-space: nowrap; }

/* TOTAL */
.total-card { border: 2px solid var(--amber); border-radius: 12px; padding: 16px; margin-bottom: 12px; background: var(--card); }
.total-title { font-weight: 900; font-size: 12px; color: var(--amber); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 12px; }
.total-metrics { display: flex; gap: 6px; }
.total-metric { flex: 1; text-align: center; }
.total-metric .m-lbl { font-size: 8px; }
.total-metric .m-val { font-size: 22px; }

/* GOOGLE MAPS BTN */
.gm-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: var(--blue); color: white; padding: 14px 20px; border-radius: 8px;
  font-size: 13px; text-decoration: none; letter-spacing: 0.06em;
  text-transform: uppercase; font-weight: 700; margin-bottom: 10px;
  font-family: ui-monospace, monospace;
}
.gm-btn:active { opacity: 0.85; }

/* TIP */
.tip { font-size: 10px; color: var(--muted); text-align: center; margin-top: 20px; line-height: 1.8; }

/* INSTALL BANNER */
.install-banner {
  background: linear-gradient(135deg, #1a1816, #221f1c);
  border: 1px solid var(--amber); border-radius: 12px;
  padding: 14px 16px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 12px;
}
.install-icon { font-size: 28px; flex-shrink: 0; margin-top: 2px; }
.install-text { flex: 1; }
.install-text strong { color: var(--amber); font-size: 12px; display: block; margin-bottom: 3px; letter-spacing: 0.05em; }
.install-text span { color: var(--sub); font-size: 11px; line-height: 1.5; }
.install-close { color: var(--muted); background: none; border: none; font-size: 18px; padding: 0; cursor: pointer; flex-shrink: 0; }

/* LOADING ANIMATION */
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.loading-dot { display: inline-block; animation: pulse 1s ease-in-out infinite; }
.loading-dot:nth-child(2) { animation-delay: 0.2s; }
.loading-dot:nth-child(3) { animation-delay: 0.4s; }
</style>
</head>
<body>
<div class="scroll">

  <!-- iOS Install Banner -->
  <div class="install-banner" id="installBanner">
    <div class="install-icon">📲</div>
    <div class="install-text">
      <strong>Add to Home Screen</strong>
      <span>Tap the <strong style="color:var(--text)">Share</strong> button in Safari, then <strong style="color:var(--text)">"Add to Home Screen"</strong> to use this like a native app.</span>
    </div>
    <button class="install-close" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="van-emoji">🚐</div>
    <div>
      <div class="title">VAN ROUTE<br>PLANNER</div>
      <div class="subtitle">UK Journey Calculator</div>
    </div>
    <div class="speed-badge">
      <div class="speed-num">60</div>
      <div class="speed-unit">mph max</div>
    </div>
  </div>

  <!-- Form -->
  <div class="card">
    <div class="grid2">
      <div>
        <div class="field-label"><span class="dot" style="background:var(--amber)"></span> From</div>
        <input type="text" id="from" placeholder="e.g. Manchester" autocomplete="off" autocorrect="off" autocapitalize="words" inputmode="text">
      </div>
      <div>
        <div class="field-label"><span class="dot" style="background:var(--red)"></span> To</div>
        <input type="text" id="to" placeholder="e.g. London" autocomplete="off" autocorrect="off" autocapitalize="words" inputmode="text">
      </div>
    </div>

    <div id="stops-list"></div>
    <button class="btn-add" onclick="addStop()">＋ Add via stop</button>

    <div class="divider"></div>
    <button class="btn-calc" id="calcBtn" onclick="calculate()">🗺 Calculate Route</button>
  </div>

  <div id="output"></div>

  <p class="tip">
    Powered by Claude AI · Real UK road knowledge<br>
    Town · City · Postcode · Full address — all accepted
  </p>

</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const VAN_MPH = 60;
let stopId = 0;

// Hide install banner if not on iOS Safari
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.navigator.standalone;
if (!isIOS || isStandalone) {
  document.getElementById('installBanner').style.display = 'none';
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function fmt(h) {
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  if (!hh) return mm + 'm';
  if (!mm) return hh + 'h';
  return hh + 'h ' + mm + 'm';
}
function fmtX(h) {
  if (h <= 0.05) return 'None';
  const hh = Math.floor(h), mm = Math.round((h - hh) * 60);
  if (!hh) return '+' + mm + 'm';
  if (!mm) return '+' + hh + 'h';
  return '+' + hh + 'h ' + mm + 'm';
}
function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Stops ────────────────────────────────────────────────────────────────────
function addStop() {
  const id = ++stopId;
  const div = document.createElement('div');
  div.className = 'stop-row';
  div.id = 'stop-' + id;
  div.innerHTML = `
    <input type="text" placeholder="Via — e.g. Birmingham" autocomplete="off" autocorrect="off" autocapitalize="words" inputmode="text">
    <button class="btn-rm" onclick="removeStop(${id})">✕</button>
  `;
  document.getElementById('stops-list').appendChild(div);
  div.querySelector('input').focus();
}
function removeStop(id) {
  const el = document.getElementById('stop-' + id);
  if (el) el.remove();
}
function getStops() {
  return [...document.querySelectorAll('#stops-list input')]
    .map(i => i.value.trim()).filter(Boolean);
}

// ─── API Call ─────────────────────────────────────────────────────────────────
async function callAPI(waypoints) {
  const prompt = `You are an expert UK road journey estimator. Calculate routes between these UK locations in order: ${waypoints.join(' → ')}

For EACH consecutive pair of locations provide:
- Realistic ROAD distance in miles (actual road routing via motorways/A-roads, NOT straight line)
- Normal driving time in minutes at typical mixed UK speeds

Respond with ONLY this exact JSON format, no markdown, no explanation:
{"segments":[{"from":"short display name","to":"short display name","distanceMiles":0,"normalMinutes":0}]}

Calibration data: London-Manchester 198mi/143min, Edinburgh-London 404mi/418min, Bristol-Birmingham 88mi/84min, Leeds-Sheffield 36mi/37min, Cardiff-Swansea 42mi/44min, Glasgow-Edinburgh 47mi/55min, Liverpool-Leeds 74mi/74min, Southampton-Brighton 62mi/70min.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 800,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error?.message || 'API request failed (' + response.status + ')');
  }
  const data = await response.json();
  if (data.error) throw new Error(data.error.message);

  // Robustly extract JSON from response
  const raw = data.content.map(b => b.text || '').join('');
  const match = raw.match(/\{[\s\S]*\}/);
  if (!match) throw new Error('No valid JSON in response');
  return JSON.parse(match[0]);
}

// ─── Main Calculate ───────────────────────────────────────────────────────────
async function calculate() {
  const from = document.getElementById('from').value.trim();
  const to = document.getElementById('to').value.trim();
  const stops = getStops();
  const out = document.getElementById('output');
  const btn = document.getElementById('calcBtn');

  if (!from || !to) {
    out.innerHTML = '<div class="status-box err">⚠ Please enter a start and destination.</div>';
    return;
  }

  // Loading state
  btn.disabled = true;
  btn.innerHTML = 'Calculating <span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>';
  out.innerHTML = '<div class="status-box info">🗺 Routing via AI — estimating UK road distances...</div>';

  try {
    const waypoints = [from, ...stops, to];
    out.innerHTML = '<div class="status-box info">🗺 Connecting to AI...</div>';
    const data = await callAPI(waypoints);

    const segs = data.segments.map(s => {
      const n = s.normalMinutes / 60;
      const v = Math.max(n, s.distanceMiles / VAN_MPH);
      return { ...s, nH: n, vH: v, xH: v - n };
    });

    const totV = segs.reduce((a, s) => a + s.vH, 0);
    const totN = segs.reduce((a, s) => a + s.nH, 0);
    const totD = segs.reduce((a, s) => a + s.distanceMiles, 0);
    const totX = totV - totN;

    const gmUrl = 'https://www.google.com/maps/dir/' +
      waypoints.map(w => encodeURIComponent(w + ', UK')).join('/');

    let html = '';

    // Segments
    segs.forEach((s, i) => {
      html += `
        <div class="seg">
          <div class="seg-head">
            <span class="place">${esc(s.from)}</span>
            <span class="arrow">→</span>
            <span class="place">${esc(s.to)}</span>
            ${segs.length > 1 ? `<span class="leg">Leg ${i + 1}</span>` : ''}
          </div>
          <div class="metrics">
            <div class="metric">
              <div class="m-lbl">🚐 Van</div>
              <div class="m-val" style="color:var(--amber)">${fmt(s.vH)}</div>
              <div class="m-sub">60 mph cap</div>
            </div>
            <div class="metric">
              <div class="m-lbl">🚗 Normal</div>
              <div class="m-val" style="color:var(--green)">${fmt(s.nH)}</div>
              <div class="m-sub">typical</div>
            </div>
            <div class="metric">
              <div class="m-lbl">⏱ Extra</div>
              <div class="m-val" style="color:${s.xH > 0.05 ? 'var(--red)' : 'var(--green)'}">${fmtX(s.xH)}</div>
              <div class="m-sub">${s.xH > 0.05 ? 'penalty' : 'no penalty'}</div>
            </div>
            <div class="metric">
              <div class="m-lbl">📏 Miles</div>
              <div class="m-val" style="color:var(--blue)">${s.distanceMiles.toFixed(1)}</div>
              <div class="m-sub">road miles</div>
            </div>
          </div>
        </div>`;
    });

    // Total (multi-leg)
    if (segs.length > 1) {
      html += `
        <div class="total-card">
          <div class="total-title">▶ Total Journey</div>
          <div class="total-metrics">
            <div class="total-metric"><div class="m-lbl">🚐 Van</div><div class="m-val" style="color:var(--amber)">${fmt(totV)}</div></div>
            <div class="total-metric"><div class="m-lbl">🚗 Normal</div><div class="m-val" style="color:var(--green)">${fmt(totN)}</div></div>
            <div class="total-metric"><div class="m-lbl">⏱ Extra</div><div class="m-val" style="color:${totX > 0.05 ? 'var(--red)' : 'var(--green)'}">${fmtX(totX)}</div></div>
            <div class="total-metric"><div class="m-lbl">📏 Miles</div><div class="m-val" style="color:var(--blue)">${totD.toFixed(1)}</div></div>
          </div>
        </div>`;
    } else {
      const s = segs[0];
      html += `<div class="status-box ${s.xH > 0.05 ? 'err' : 'ok'}">
        ${s.xH > 0.05
          ? `⏱ Your van adds <strong>${fmtX(s.xH)}</strong> vs a car — the 60 mph limit affects this route.`
          : '✓ No extra time — average road speed is below 60 mph on this route anyway.'}
      </div>`;
    }

    // Google Maps link
    html += `<a class="gm-btn" href="${gmUrl}" target="_blank">🗺 Open in Google Maps ↗</a>`;

    out.innerHTML = html;

  } catch (e) {
    const msg = e.message || 'Unknown error';
    const isNetwork = msg.includes('fetch') || msg.includes('network') || msg.includes('Failed');
    out.innerHTML = `<div class="status-box err">
      ⚠ <strong>${esc(msg)}</strong><br><br>
      <small style="opacity:0.8">${isNetwork
        ? '🌐 Network error — this app must be opened via https:// (not a local file). Make sure GitHub Pages is enabled and you\'re using the full URL.'
        : '🔧 If this keeps happening, screenshot this error and share it.'
      }</small>
    </div>`;
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🗺 Calculate Route';
  }
}

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement.tagName === 'INPUT') calculate();
});
</script>
</body>
</html>
